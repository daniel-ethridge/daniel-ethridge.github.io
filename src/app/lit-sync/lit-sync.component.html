<div class="container mt-4">
    <h2>Literature Files</h2>
    
    <div *ngIf="errorMessage" class="alert alert-danger">
        {{ errorMessage }}
    </div>

    <div *ngIf="loading" class="text-center">
        <div class="spinner-border" role="status">
            <span class="visually-hidden">Loading...</span>
        </div>
    </div>

    <div *ngIf="!loading && files.length === 0" class="alert alert-info">
        No files found in storage.
    </div>

    <div class="list-group mt-3">
        <div *ngFor="let file of files" class="list-group-item d-flex justify-content-between align-items-center">
            <div>
                <span class="file-name">{{file.name}}</span>
                <small class="text-muted d-block">Added: {{file.timestamp | date:'medium'}}</small>
            </div>
            <button class="btn btn-primary btn-sm" (click)="downloadFile(file)">
                Download
            </button>
        </div>
    </div>
</div>
